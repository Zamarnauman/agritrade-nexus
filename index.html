<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriTrade Nexus</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "lucide-react": "https://esm.sh/lucide-react@0.330.0?deps=react@18.2.0"
      }
    }
  </script>
  <!-- Load Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Custom simple styling for animations */
    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    .flow-line {
      stroke-dasharray: 5, 5;
      animation: dash 1s linear infinite;
    }
    .fadeIn {
      animation: fadeInOpacity 0.3s ease-in forwards;
    }
    @keyframes fadeInOpacity {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen overflow-x-hidden">
  <div id="root"></div>
  
  <script type="text/babel" data-type="module">
    import React from "react";
    import { createRoot } from "react-dom/client";
    import App from "./App.jsx";

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
